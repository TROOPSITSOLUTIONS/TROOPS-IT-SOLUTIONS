<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Generator - Team BCT</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Rajdhani for Logo, Play for Announcement, Inter for Body -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&family=Play:wght@400;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* CSS Variables - Deep Pure Black & Maroon/Red Theme */
        :root {
            --bg-color: #030000;
            --header-bg: #000000; /* Deep Pure Black exactly like footer */
            --card-bg: #070000;
            --border-color: #3a0808;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent-blue: #dc2626; /* Deep Red Accent */
            --popular-purple: #0a0000;
            --popular-text: #fecaca;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #150000 0%, transparent 40%);
        }

        /* Sticky Wrapper with Deep Black and Subtle Shadow */
        .sticky-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: #000000; /* Strictly Pure Black */
            border-bottom: 1px solid rgba(220, 38, 38, 0.15); /* Light border */
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02), 0 2px 8px rgba(0, 0, 0, 0.7);
        }

        /* Header */
        header {
            background-color: #000000; /* Strictly Pure Black */
            padding: 15px 20px;
            display: flex;
            align-items: center;
        }

        .menu-icon {
            font-size: 20px;
            color: var(--text-main);
            cursor: pointer;
            margin-right: auto;
            width: 25px;
            display: inline-block;
        }

        /* Logo Area */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-right: auto;
            transform: translateX(-10px);
            text-decoration: none;
            color: inherit;
        }

        /* গোল বর্ডার লোগো ইমেজ স্টাইল */
        .logo-img-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-img-container img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(220, 38, 38, 0.6);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 0 10px rgba(220, 38, 38, 0.3);
            object-fit: cover;
        }

        .logo-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #150000, #050000);
            padding: 6px;
            border-radius: 50%;
            border: 1px solid rgba(220, 38, 38, 0.6);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 0 10px rgba(220, 38, 38, 0.3);
            font-size: 15px;
            color: var(--accent-blue);
            width: 38px;
            height: 38px;
        }

        /* Rajdhani Bold Font - FORCE ALL CAPS */
        .logo-text {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700; /* Bold */
            font-size: 27px;
            letter-spacing: 0px;
            display: flex;
            align-items: center;
            color: #d1d5db; /* Light Grey/Off-white */
            text-transform: uppercase !important; /* Forces uppercase globally */
            text-shadow: none; /* No glow */
        }

        /* BCT in Solid Red with Reduced Gap */
        .logo-text span {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            margin-left: 4px; /* Tight gap */
            color: #b91c1c; /* Solid Deep Red */
            text-transform: uppercase !important; /* Force caps */
            -webkit-text-stroke: 0; /* No stroke */
            text-shadow: none; /* No glow */
        }

        /* Totally Minimal & Formal Dropdown Menu */
        .nav-menu-dropdown {
            background: linear-gradient(to bottom, #050000, #000000); /* Simple normal gradient */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid #1a0000;
            border-bottom: 1px solid #3a0808; /* Thin formal red border */
            border-radius: 0; /* Straight edges, totally formal */
            display: none;
            padding: 10px 0; /* Flush to edges */
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.9);
            animation: menuFadeIn 0.2s ease-out forwards;
        }

        @keyframes menuFadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0; /* No gap, formal list style */
        }

        /* Clean row style for menu items */
        .dropdown-links a {
            color: #d1d5db; /* Professional light gray */
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: transparent;
            border-left: 3px solid transparent; /* Ready for hover */
            border-bottom: 1px solid #0f0000; /* Subtle separator */
            transition: all 0.2s ease;
        }

        .dropdown-links a:last-child {
            border-bottom: none;
        }

        /* Minimalist icons */
        .dropdown-links a i {
            color: #6b7280; /* Muted icon */
            font-size: 16px;
            width: 20px;
            text-align: center;
            transition: color 0.2s ease;
        }

        /* Minimal Formal Hover Effect */
        .dropdown-links a:hover {
            background: linear-gradient(90deg, #150000 0%, #000000 100%); /* Slight red tint */
            color: #ffffff;
            border-left: 3px solid #dc2626; /* Professional red accent on left */
            padding-left: 24px; /* Slight indent */
        }

        .dropdown-links a:hover i {
            color: #dc2626; /* Icon turns red */
        }

        /* Container */
        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            flex-grow: 1;
        }

        /* Telegram Announcement - Abstract Red Glow Inside Banner */
        .announcement-banner {
            background: linear-gradient(145deg, #0f0000, #030000);
            border: 1px solid rgba(220, 38, 38, 0.3);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
            display: none;
            position: relative;
            overflow: hidden;
        }

        .announcement-banner::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Font Play Regular for the text */
        .announcement-banner p {
            font-family: 'Play', sans-serif;
            font-weight: 400;
            font-size: 15px;
            line-height: 1.6;
            color: #ffc2c2;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        /* Clean, Solid, Less Glossy Join Button */
        .join-btn {
            display: inline-block;
            position: relative;
            z-index: 1;
            background-color: #dc2626; /* Solid red */
            color: white;
            padding: 10px 32px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border: none;
            box-shadow: 0 4px 10px rgba(220, 38, 38, 0.2);
            transition: all 0.2s ease;
        }
        
        .join-btn:hover {
            background-color: #ef4444; /* Brighter red on hover */
            box-shadow: 0 6px 15px rgba(220, 38, 38, 0.4);
            transform: translateY(-2px);
        }

        /* Popular Tools Dropdown - New Modern Design */
        .popular-tools-btn {
            background-color: #0a0000;
            border: none;
            border-left: 4px solid #dc2626; /* Left edge accent */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
            padding: 14px 18px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .popular-tools-btn:hover {
            background-color: #150000;
            border-left-color: #ff4d4d;
        }

        .popular-tools-list {
            background-color: #070000;
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 4px;
            margin-top: -15px;
            margin-bottom: 20px;
            display: none;
            flex-direction: column;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.7);
            overflow: hidden;
        }

        .popular-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(220, 38, 38, 0.1);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .popular-item:last-child {
            border-bottom: none;
        }

        .popular-item:hover {
            background-color: #120000;
        }

        .popular-item i {
            color: rgba(220, 38, 38, 0.8);
        }

        /* Tool Generator Card */
        .tool-card {
            background: linear-gradient(145deg, #0a0000, #030000);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 10px;
            padding: 25px 20px;
            margin-bottom: 25px;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05), 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .tool-card h2 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: white;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        /* Form elements */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-group input, .form-group select {
            width: 100%;
            background-color: #070000;
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 6px;
            padding: 11px 15px;
            color: white;
            font-size: 13.5px;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: rgba(220, 38, 38, 0.8);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.8), 0 0 12px rgba(220, 38, 38, 0.2);
            background: #0d0000;
        }

        /* Multi columns form layout */
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .gen-btn {
            width: 100%;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .gen-btn:hover {
            background-color: #ef4444; /* Brighter red on hover */
            box-shadow: 0 6px 15px rgba(220, 38, 38, 0.4);
            transform: translateY(-2px);
        }

        /* Result Area */
        .result-box {
            margin-top: 25px;
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .result-header h4 {
            font-size: 13px;
            color: var(--text-muted);
        }

        .copy-all-btn {
            background: none;
            border: none;
            color: var(--accent-blue);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .copy-all-btn:hover {
            color: #ef4444;
        }

        .result-textarea {
            width: 100%;
            height: 150px;
            background-color: #030000;
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 6px;
            padding: 12px;
            color: #4ade80; 
            font-family: monospace;
            font-size: 12.5px;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        /* Notice message */
        .disclaimer-text {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
            text-align: center;
            margin-top: 15px;
        }

        /* Footer - Pure Black with Abstract Top Glow */
        footer {
            position: relative;
            background-color: #000000;
            padding: 30px 15px 15px 15px;
            margin-top: auto;
            border-top: 1px solid rgba(220, 38, 38, 0.1);
        }

        /* Abstract Red Line on top of footer */
        footer::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(220, 38, 38, 0.8), transparent);
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.6);
        }

        .footer-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .footer-about h4 {
            color: rgba(220, 38, 38, 0.9);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .footer-about p {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .footer-col h5 {
            font-size: 13px;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .footer-links {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 8px;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s;
        }
        
        .footer-links a:hover {
            color: #fecaca;
        }

        /* ========================================= */
        /* PROFESSIONAL CENTERED COPYRIGHT BAR       */
        /* ========================================= */
        .copyright-bar {
            position: relative;
            max-width: 600px;
            margin: 20px auto 0 auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center; /* Centered layout */
            align-items: center;
            font-size: 13px; /* Slightly larger, professional size */
            color: #9ca3af;
            text-align: center;
        }

        .copyright-text {
            line-height: 1.5;
            letter-spacing: 0.3px;
        }

        .trustiq-link {
            color: #dc2626 !important; /* Solid Red */
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .trustiq-link:hover {
            color: #ef4444 !important; /* Brighter red on hover */
            text-shadow: 0 0 8px rgba(220, 38, 38, 0.6);
        }

        .scroll-top-btn {
            position: absolute;
            right: 0; /* Professional alignment to the right boundary */
            background: linear-gradient(145deg, #120000, #050000);
            color: white;
            border: 1px solid rgba(220, 38, 38, 0.3);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
        }
        
        .scroll-top-btn:hover {
            background: #2e0505;
            border-color: rgba(220, 38, 38, 0.8);
            color: #ffc2c2;
        }
    </style>
</head>
<body>

    <!-- Sticky Header and Search Wrapper -->
    <div class="sticky-wrapper">
        <!-- Header -->
        <header>
            <div class="menu-icon" onclick="toggleNavDropdown()"><i class="fa-solid fa-bars"></i></div>
            <a href="/" class="logo" id="headerLogoContainer">
                <!-- ইমেজ এবং গ্লোয়িং টেক্সট লোগো এখানে পাশাপাশি লোড হবে -->
            </a>
        </header>

        <!-- Dropdown Navigation Drawer -->
        <div class="nav-menu-dropdown" id="navDropdown">
            <ul class="dropdown-links" id="drawerLinksContainer">
                <!-- Dynamic Menu Items will load here -->
            </ul>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Announcement Banner -->
        <div class="announcement-banner" id="announceBanner">
            <p id="announcementText"></p>
            <a href="#" id="telegramJoinLink" class="join-btn" target="_blank">Join Now</a>
        </div>

        <!-- Popular Tools Dropdown -->
        <div class="popular-tools-btn" id="popularBtn">
            <span>Popular Tools</span>
            <i class="fa-solid fa-chevron-right" id="popArrow"></i>
        </div>
        <div class="popular-tools-list" id="popularList"></div>
        
        <!-- Tool Generator Card -->
        <div class="tool-card">
            <h2>Credit Card Generator</h2>
            
            <!-- BIN Pattern -->
            <div class="form-group">
                <label>BIN Pattern / Bin Code</label>
                <input type="text" id="binInput" placeholder="e.g. 400011xxxxxxxxxx or 542239" maxlength="16" value="400011">
            </div>

            <!-- Brand Selection -->
            <div class="form-group">
                <label>Card Brand (Autodetect if custom BIN provided)</label>
                <select id="brandSelect" onchange="updateBinPlaceholder()">
                    <option value="custom">Custom BIN Input</option>
                    <option value="visa">Visa (Starts with 4)</option>
                    <option value="mastercard">Mastercard (Starts with 5)</option>
                    <option value="amex">American Express (Starts with 37)</option>
                    <option value="discover">Discover (Starts with 6011)</option>
                </select>
            </div>

            <!-- Month & Year Row -->
            <div class="form-row">
                <div class="form-group">
                    <label>Expiry Month</label>
                    <select id="expMonth">
                        <option value="random">Random</option>
                        <option value="01">01 - Jan</option>
                        <option value="02">02 - Feb</option>
                        <option value="03">03 - Mar</option>
                        <option value="04">04 - Apr</option>
                        <option value="05">05 - May</option>
                        <option value="06">06 - Jun</option>
                        <option value="07">07 - Jul</option>
                        <option value="08">08 - Aug</option>
                        <option value="09">09 - Sep</option>
                        <option value="10">10 - Oct</option>
                        <option value="11">11 - Nov</option>
                        <option value="12">12 - Dec</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Expiry Year</label>
                    <select id="expYear">
                        <option value="random">Random</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                        <option value="2029">2029</option>
                        <option value="2030">2030</option>
                        <option value="2031">2031</option>
                        <option value="2032">2032</option>
                        <option value="2033">2033</option>
                        <option value="2034">2034</option>
                        <option value="2035">2035</option>
                    </select>
                </div>
            </div>

            <!-- CVV & Quantity Row -->
            <div class="form-row">
                <div class="form-group">
                    <label>CVV (Card Verification Value)</label>
                    <input type="text" id="cvvInput" placeholder="Leave empty for random" maxlength="4">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <select id="quantitySelect">
                        <option value="10">10 Cards</option>
                        <option value="20">20 Cards</option>
                        <option value="50">50 Cards</option>
                        <option value="100">100 Cards</option>
                    </select>
                </div>
            </div>

            <!-- Action Button -->
            <button class="gen-btn" onclick="generateMockCards()"><i class="fa-solid fa-arrows-rotate"></i> Generate Cards</button>

            <!-- Result Box -->
            <div class="result-box" id="resultBox">
                <div class="result-header">
                    <h4>Generated Mock Cards List</h4>
                    <button class="copy-all-btn" onclick="copyResultText()"><i class="fa-regular fa-copy"></i> Copy All</button>
                </div>
                <textarea class="result-textarea" id="resultTextarea" readonly></textarea>
                <p class="disclaimer-text">These numbers are entirely fictional, mathematically generated mock testing details. They cannot be used for purchase transactions.</p>
            </div>
        </div>

    </div>

    <!-- Footer - Pure Black with Abstract Top Glow -->
    <footer>
        <div class="footer-content">
            <div class="footer-about">
                <h4>About Us</h4>
                <p id="footerAboutText">One Step Online Tools</p>
            </div>
            <div class="footer-grid" id="footerGridContainer">
                <!-- Columns render dynamically -->
            </div>
        </div>
        <!-- Centered Copyright Bar -->
        <div class="copyright-bar">
            <span class="copyright-text" id="copyrightSpan">
                &copy; 2026. All Rights Reserved by <a href="https://www.facebook.com/profile.php?id=61586091802176" target="_blank" class="trustiq-link">Trustiq</a>.
            </span>
            <button class="scroll-top-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                <i class="fa-solid fa-chevron-up"></i>
            </button>
        </div>
    </footer>

    <script>
        // CONFIG
        const GIST_OWNER = 'TROOPSITSOLUTIONS';
        const GIST_ID = '3bfa4b9ca8dbdc1038918d63329096b3';
        const GIST_URL = `https://gist.githubusercontent.com/${GIST_OWNER}/${GIST_ID}/raw/tools.json`;

        let siteData = null;

        async function loadData() {
            try {
                const res = await fetch(`${GIST_URL}?t=${Date.now()}`);
                if (!res.ok) throw new Error();
                siteData = await res.json();
                applyTheme();
                applySiteConfig();
                trackVisits(); // ট্র্যাফিক ট্র্যাক সিস্টেম স্টার্ট
            } catch (e) {
                console.error("Gist Load Failed. Check Gist connection.");
            }
        }

        // Apply theme properties dynamically
        function applyTheme() {
            if (siteData.themeConfig) {
                const root = document.documentElement;
                Object.entries(siteData.themeConfig).forEach(([key, val]) => {
                    const cssKey = `--${key.replace(/([A-Z])/g, "-$1").toLowerCase()}`;
                    root.style.setProperty(cssKey, val);
                });
            }
        }

        function applySiteConfig() {
            // Header Settings (ইমেজ ও টেক্সট পাশাপাশি লোড লজিক এবং ডাবল BCT বাগ ফিক্সড)
            const logoContainer = document.getElementById('headerLogoContainer');
            let imgHTML = '';
            if (siteData.siteConfig.logoUrl && siteData.siteConfig.logoUrl.trim() !== "") {
                imgHTML = `
                    <div class="logo-img-container">
                        <img src="${siteData.siteConfig.logoUrl}">
                    </div>
                `;
            } else {
                // জিস্ট থেকে ইনপুটকৃত আইকন ক্লাস পার্সিং সリューション (ডাবল fa-solid প্রিফিক্স প্রতিরোধ লজিক)
                let iconClass = siteData.siteConfig.logoIcon || 'fa-shield-halved';
                if (!iconClass.includes('fa-')) {
                    iconClass = 'fa-solid fa-' + iconClass;
                } else if (!iconClass.includes('fa-solid') && !iconClass.includes('fa-regular') && !iconClass.includes('fas') && !iconClass.includes('far')) {
                    iconClass = 'fa-solid ' + iconClass;
                }

                imgHTML = `
                    <div class="logo-icon">
                        <i class="${iconClass}"></i>
                    </div>
                `;
            }

            // ২. লোগো টেক্সট পার্ট জেনারেটর (TEAM BCT Force UPPERCASE in JS logic)
            const siteName = siteData.siteConfig.siteName || "TEAM BCT";
            let textHTML = "";
            const parts = siteName.trim().split(/\s+/);
            
            if (parts.length > 1) {
                let firstPart = parts[0].toUpperCase();
                let secondPart = parts.slice(1).join(" ").toUpperCase();
                textHTML = `${firstPart}<span>${secondPart}</span>`;
            } else {
                if (siteName.toLowerCase().startsWith("team") && siteName.length > 4) {
                    let firstPart = "TEAM";
                    let secondPart = siteName.slice(4).toUpperCase();
                    textHTML = `${firstPart}<span>${secondPart}</span>`;
                } else {
                    textHTML = `${siteName.toUpperCase()}<span>BCT</span>`;
                }
            }

            logoContainer.innerHTML = `
                ${imgHTML}
                <span class="logo-text">${textHTML}</span>
            `;

            // Navigation Menu with Icons
            const drawerLinks = document.getElementById('drawerLinksContainer');
            drawerLinks.innerHTML = '';
            siteData.navigationMenu.forEach(menu => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${menu.link}"><i class="fa-solid ${menu.icon || 'fa-link'}"></i> ${escapeHtml(menu.title)}</a>`;
                drawerLinks.appendChild(li);
            });

            // Announcement Banner
            const banner = document.getElementById('announceBanner');
            if (siteData.siteConfig.showAnnouncement) {
                banner.style.display = 'block';
                document.getElementById('announcementText').innerText = siteData.siteConfig.announcementText;
                document.getElementById('telegramJoinLink').href = siteData.siteConfig.telegramUrl;
            } else {
                banner.style.display = 'none';
            }

            // Popular tools dropdown
            const popList = document.getElementById('popularList');
            popList.innerHTML = '';
            siteData.siteConfig.popularTools.forEach(tool => {
                const div = document.createElement('div');
                div.className = 'popular-item';
                div.innerHTML = `<i class="fa-solid fa-check"></i> <span>${escapeHtml(tool.title)}</span>`;
                
                div.onclick = function() {
                    trackToolUsed();
                    if (tool.link === '#') {
                        Swal.fire({
                            title: 'Coming Soon!',
                            text: `${tool.title} is under development.`,
                            icon: 'info',
                            background: siteData.themeConfig.cardBg || '#131c31',
                            color: '#fff',
                            confirmButtonColor: siteData.themeConfig.accentBlue || '#ef4444'
                        });
                    } else {
                        window.location.href = tool.link;
                    }
                };
                popList.appendChild(div);
            });

            // Footer Configuration
            document.getElementById('footerAboutText').innerText = siteData.footerConfig.aboutText;

            const footerGrid = document.getElementById('footerGridContainer');
            footerGrid.innerHTML = '';
            siteData.footerConfig.columns.forEach(col => {
                const div = document.createElement('div');
                div.className = 'footer-col';
                div.innerHTML = `<h5>${escapeHtml(col.title)}</h5><ul class="footer-links"></ul>`;
                const ul = div.querySelector('.footer-links');
                col.links.forEach(l => {
                    ul.innerHTML += `<li><a href="${l.url}">${escapeHtml(l.title)}</a></li>`;
                });
                footerGrid.appendChild(div);
            });
        }

        // Dropdown Navigation Drawer Controls (থ্রি-লাইন ড্রপডাউন টগল ও আইকন পরিবর্তন)
        function toggleNavDropdown() {
            const dropdown = document.getElementById('navDropdown');
            const menuIcon = document.querySelector('.menu-icon i');
            const isVisible = dropdown.style.display === 'block';

            if (isVisible) {
                dropdown.style.display = 'none';
                menuIcon.className = 'fa-solid fa-bars';
            } else {
                dropdown.style.display = 'block';
                menuIcon.className = 'fa-solid fa-xmark';
            }
        }

        // Popular Dropdown Toggle
        const popularBtn = document.getElementById('popularBtn');
        const popularList = document.getElementById('popularList');
        const popArrow = document.getElementById('popArrow');
        popularBtn.addEventListener('click', () => {
            const isFlex = popularList.style.display === 'flex';
            popularList.style.display = isFlex ? 'none' : 'flex';
            popArrow.className = isFlex ? 'fa-solid fa-chevron-right' : 'fa-solid fa-chevron-down';
        });

        // update placeholder based on brand selected
        function updateBinPlaceholder() {
            const brand = document.getElementById('brandSelect').value;
            const binInput = document.getElementById('binInput');

            if (brand === 'visa') {
                binInput.value = '400011';
            } else if (brand === 'mastercard') {
                binInput.value = '542239';
            } else if (brand === 'amex') {
                binInput.value = '371249';
            } else if (brand === 'discover') {
                binInput.value = '601132';
            }
        }

        // ==================== LUHN ALGORITHM GENERATOR CORE ====================
        function generateLuhnNumber(prefix, length) {
            let ccNumber = prefix.toString().replace(/x/gi, ''); // remove placeholder 'x' if any
            
            // Fill random digits up to length - 1
            while (ccNumber.length < (length - 1)) {
                ccNumber += Math.floor(Math.random() * 10);
            }
            
            // Calculate Luhn checksum digit (Mod 10 Checksum)
            let sum = 0;
            let alternate = true;
            for (let i = ccNumber.length - 1; i >= 0; i--) {
                let n = parseInt(ccNumber.charAt(i), 10);
                if (alternate) {
                    n *= 2;
                    if (n > 9) {
                        n = (n % 10) + 1;
                    }
                }
                sum += n;
                alternate = !alternate;
            }
            
            let checksum = (10 - (sum % 10)) % 10;
            return ccNumber + checksum;
        }

        function generateMockCards() {
            const rawBin = document.getElementById('binInput').value.trim();
            const brand = document.getElementById('brandSelect').value;
            const expMonthVal = document.getElementById('expMonth').value;
            const expYearVal = document.getElementById('expYear').value;
            const cvvInputVal = document.getElementById('cvvInput').value.trim();
            const quantity = parseInt(document.getElementById('quantitySelect').value);

            // Clean inputs from unwanted symbols
            let cleanBin = rawBin.replace(/[^0-9]/g, '');
            if (cleanBin === "") {
                Swal.fire('Input Error', 'Please enter a valid numeric BIN code!', 'error');
                return;
            }

            // Set length based on card specifications
            let cardLength = 16;
            if (brand === 'amex' || cleanBin.startsWith('37') || cleanBin.startsWith('34')) {
                cardLength = 15;
            }

            let results = [];

            for (let i = 0; i < quantity; i++) {
                // Generate Luhn compliant number
                const cardNumber = generateLuhnNumber(cleanBin, cardLength);

                // Expiry Month
                let month = expMonthVal;
                if (month === 'random') {
                    month = String(Math.floor(Math.random() * 12) + 1).padStart(2, '0');
                }

                // Expiry Year
                let year = expYearVal;
                if (year === 'random') {
                    year = String(Math.floor(Math.random() * 11) + 2025);
                }

                // CVV
                let cvv = cvvInputVal;
                if (cvv === "") {
                    let cvvLength = (cardLength === 15) ? 4 : 3; // Amex uses 4 digit CVV
                    cvv = "";
                    for (let c = 0; c < cvvLength; c++) {
                        cvv += Math.floor(Math.random() * 10);
                    }
                }

                results.push(`${cardNumber}|${month}|${year}|${cvv}`);
            }

            // Display Results
            const resultBox = document.getElementById('resultBox');
            const textarea = document.getElementById('resultTextarea');
            textarea.value = results.join('\n');
            resultBox.style.display = 'block';

            // Scroll down smoothly
            resultBox.scrollIntoView({ behavior: 'smooth' });
        }

        function copyResultText() {
            const textarea = document.getElementById('resultTextarea');
            if (textarea.value === "") return;
            
            textarea.select();
            document.execCommand('copy');
            
            Swal.fire({
                title: 'Copied!',
                text: 'Generated cards list copied to clipboard successfully.',
                icon: 'success',
                timer: 1500,
                showConfirmButton: false,
                background: siteData.themeConfig.cardBg || '#18181b',
                color: '#fff'
            });
        }

        // ক্লাউড অ্যানালিটিক্স ট্র্যাক সিস্টেম
        function trackVisits() {
            fetch('https://api.countapi.xyz/hit/teambct_analytics/total_visits').catch(() => {});
            
            if (!sessionStorage.getItem('visitedToday')) {
                const today = new Date().toISOString().split('T')[0];
                fetch(`https://api.countapi.xyz/hit/teambct_analytics/daily_visits_${today}`).catch(() => {});
                sessionStorage.setItem('visitedToday', 'true');
            }
        }

        function trackToolUsed() {
            fetch('https://api.countapi.xyz/hit/teambct_analytics/total_tool_clicks').catch(() => {});
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m]));
        }

        window.onload = loadData;
    </script>
