<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Speed Checker - Team BCT</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Rajdhani for Logo, Play for Announcement, Inter for Body -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&family=Play:wght@400;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="teambct-config-server.js"></script>
    <style>
        /* CSS Variables - Deep Pure Black & Maroon/Red Theme */
        :root {
            --bg-color: #030000;
            --header-bg: #000000; /* Deep Pure Black exactly like footer */
            --card-bg: #070000;
            --border-color: #3a0808;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent-blue: #dc2626; /* Deep Red Accent */
            --popular-purple: #0a0000;
            --popular-text: #fecaca;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #150000 0%, transparent 40%);
        }

        /* Sticky Wrapper with Deep Black and Subtle Shadow */
        .sticky-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: #000000; /* Strictly Pure Black */
            border-bottom: 1px solid rgba(220, 38, 38, 0.15); /* Light border */
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02), 0 2px 8px rgba(0, 0, 0, 0.7);
        }

        /* Header */
        header {
            background-color: #000000; /* Strictly Pure Black */
            padding: 15px 20px;
            display: flex;
            align-items: center;
        }

        .menu-icon {
            font-size: 20px;
            color: var(--text-main);
            cursor: pointer;
            margin-right: auto;
            width: 25px;
            display: inline-block;
        }

        /* Logo Area */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-right: auto;
            transform: translateX(-10px);
            text-decoration: none;
            color: inherit;
        }

        /* গোল বর্ডার লোগো ইমেজ স্টাইল */
        .logo-img-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-img-container img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(220, 38, 38, 0.6);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 0 10px rgba(220, 38, 38, 0.3);
            object-fit: cover;
        }

        .logo-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #150000, #050000);
            padding: 6px;
            border-radius: 50%;
            border: 1px solid rgba(220, 38, 38, 0.6);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 0 10px rgba(220, 38, 38, 0.3);
            font-size: 15px;
            color: var(--accent-blue);
            width: 38px;
            height: 38px;
        }

        /* Rajdhani Bold Font - FORCE ALL CAPS */
        .logo-text {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700; /* Bold */
            font-size: 27px;
            letter-spacing: 0px;
            display: flex;
            align-items: center;
            color: #d1d5db; /* Light Grey/Off-white */
            text-transform: uppercase !important; /* Forces uppercase globally */
            text-shadow: none; /* No glow */
        }

        /* BCT in Solid Red with Reduced Gap */
        .logo-text span {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            margin-left: 4px; /* Tight gap */
            color: #b91c1c; /* Solid Deep Red */
            text-transform: uppercase !important; /* Force caps */
            -webkit-text-stroke: 0; /* No stroke */
            text-shadow: none; /* No glow */
        }

        /* Totally Minimal & Formal Dropdown Menu */
        .nav-menu-dropdown {
            background: linear-gradient(to bottom, #050000, #000000); /* Simple normal gradient */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid #1a0000;
            border-bottom: 1px solid #3a0808; /* Thin formal red border */
            border-radius: 0; /* Straight edges, totally formal */
            display: none;
            padding: 10px 0; /* Flush to edges */
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.9);
            animation: menuFadeIn 0.2s ease-out forwards;
        }

        @keyframes menuFadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0; /* No gap, formal list style */
        }

        /* Clean row style for menu items */
        .dropdown-links a {
            color: #d1d5db; /* Professional light gray */
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: transparent;
            border-left: 3px solid transparent; /* Ready for hover */
            border-bottom: 1px solid #0f0000; /* Subtle separator */
            transition: all 0.2s ease;
        }

        .dropdown-links a:last-child {
            border-bottom: none;
        }

        /* Minimalist icons */
        .dropdown-links a i {
            color: #6b7280; /* Muted icon */
            font-size: 16px;
            width: 20px;
            text-align: center;
            transition: color 0.2s ease;
        }

        /* Minimal Formal Hover Effect */
        .dropdown-links a:hover {
            background: linear-gradient(90deg, #150000 0%, #000000 100%); /* Slight red tint */
            color: #ffffff;
            border-left: 3px solid #dc2626; /* Professional red accent on left */
            padding-left: 24px; /* Slight indent */
        }

        .dropdown-links a:hover i {
            color: #dc2626; /* Icon turns red */
        }

        /* Container */
        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            flex-grow: 1;
        }

        /* Telegram Announcement - Abstract Red Glow Inside Banner */
        .announcement-banner {
            background: linear-gradient(145deg, #0f0000, #030000);
            border: 1px solid rgba(220, 38, 38, 0.3);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
            display: none;
            position: relative;
            overflow: hidden;
        }

        .announcement-banner::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Font Play Regular for the text */
        .announcement-banner p {
            font-family: 'Play', sans-serif;
            font-weight: 400;
            font-size: 15px;
            line-height: 1.6;
            color: #ffc2c2;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        /* Clean, Solid, Less Glossy Join Button */
        .join-btn {
            display: inline-block;
            position: relative;
            z-index: 1;
            background-color: #dc2626; /* Solid red */
            color: white;
            padding: 10px 32px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border: none;
            box-shadow: 0 4px 10px rgba(220, 38, 38, 0.2);
            transition: all 0.2s ease;
        }
        
        .join-btn:hover {
            background-color: #ef4444; /* Brighter red on hover */
            box-shadow: 0 6px 15px rgba(220, 38, 38, 0.4);
            transform: translateY(-2px);
        }

        /* Popular Tools Dropdown - New Modern Design */
        .popular-tools-btn {
            background-color: #0a0000;
            border: none;
            border-left: 4px solid #dc2626; /* Left edge accent */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
            padding: 14px 18px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .popular-tools-btn:hover {
            background-color: #150000;
            border-left-color: #ff4d4d;
        }

        .popular-tools-list {
            background-color: #070000;
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 4px;
            margin-top: -15px;
            margin-bottom: 20px;
            display: none;
            flex-direction: column;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.7);
            overflow: hidden;
        }

        .popular-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(220, 38, 38, 0.1);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .popular-item:last-child {
            border-bottom: none;
        }

        .popular-item:hover {
            background-color: #120000;
        }

        .popular-item i {
            color: rgba(220, 38, 38, 0.8);
        }

        /* Tool Card */
        .tool-card {
            background: linear-gradient(145deg, #0a0000, #030000);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 10px;
            padding: 25px 20px;
            margin-bottom: 25px;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05), 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .tool-card h2 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: white;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        /* Form elements */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            background-color: #070000;
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 6px;
            padding: 11px 15px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus {
            border-color: rgba(220, 38, 38, 0.8);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.8), 0 0 12px rgba(220, 38, 38, 0.2);
            background: #0d0000;
        }

        .check-btn {
            width: 100%;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .check-btn:hover {
            background-color: #ef4444; /* Brighter red on hover */
            box-shadow: 0 6px 15px rgba(220, 38, 38, 0.4);
            transform: translateY(-2px);
        }

        /* Result Panel */
        .result-panel {
            margin-top: 25px;
            display: none;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .result-panel h3 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            color: var(--accent-blue);
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 11px 15px;
            background-color: #030000;
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .result-row span:first-child {
            color: var(--text-muted);
            font-weight: 600;
        }

        .result-row span:last-child {
            font-weight: 700;
        }

        /* Status colors */
        .status-score {
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 800;
        }

        /* Dynamic Pop-Up Modal Dialogue Overlay (সকল স্ক্রিনে ফুল রেসপনসিভ ও লাইট ওভারলে) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3); /* লাইট ৩০% অপাসিটি ਕমানো হয়েছে */
            backdrop-filter: blur(1.5px); /* ব্লার কমিয়ে ১.৫px করা হয়েছে */
            -webkit-backdrop-filter: blur(1.5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            overflow-y: auto; 
            padding: 20px;
        }

        .modal-card {
            background: linear-gradient(135deg, #7f1d1d 0%, #2e0505 100%);
            width: 92%;
            max-width: 380px; 
            padding: 30px 20px;
            border-radius: 16px;
            position: relative;
            text-align: center;
            color: white;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.1), 0 15px 40px rgba(0, 0, 0, 0.9);
            transform: scale(0.9);
            transition: 0.3s ease;
            border: 1px solid rgba(220, 38, 38, 0.5);
            margin: auto; 
        }

        .modal-overlay.open .modal-card {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            font-size: 18px;
            color: #ffffff !important; /* মডাল ক্লোজ বাটন কালার সাদা ও দৃশ্যমান করা হয়েছে */
            opacity: 0.8;
            transition: all 0.2s ease;
            z-index: 10100;
        }

        .modal-close:hover {
            opacity: 1;
            color: #ffc2c2 !important;
            transform: scale(1.1);
        }

        .modal-card h3 {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .modal-card p {
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 22px;
            opacity: 0.95;
            color: #ffc2c2;
        }

        .modal-btn {
            display: inline-block;
            background-color: white;
            color: #7f1d1d;
            padding: 11px 32px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13.5px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            transition: 0.2s;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            background-color: #fecaca;
        }

        /* ছোট স্ক্রিনের জন্য মিডিয়া কোয়েরি */
        @media (max-width: 480px) {
            .modal-card {
                padding: 25px 15px;
            }
            .modal-card h3 {
                font-size: 18px;
            }
            .modal-card p {
                font-size: 12.5px;
                margin-bottom: 18px;
            }
            .modal-btn {
                padding: 10px 25px;
                font-size: 13px;
            }
        }

        /* Footer - Pure Black with Abstract Top Glow */
        footer {
            position: relative;
            background-color: #000000;
            padding: 30px 15px 15px 15px;
            margin-top: auto;
            border-top: 1px solid rgba(220, 38, 38, 0.1);
        }

        /* Abstract Red Line on top of footer */
        footer::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(220, 38, 38, 0.8), transparent);
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.6);
        }

        .footer-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .footer-about h4 {
            color: rgba(220, 38, 38, 0.9);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .footer-about p {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .footer-col h5 {
            font-size: 13px;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .footer-links {
            list-style: none;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s;
        }
        
        .footer-links a:hover {
            color: #fecaca;
        }

        /* ========================================= */
        /* PROFESSIONAL CENTERED COPYRIGHT BAR       */
        /* ========================================= */
        .copyright-bar {
            position: relative;
            max-width: 600px;
            margin: 20px auto 0 auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center; /* Centered layout */
            align-items: center;
            font-size: 13px; /* Slightly larger, professional size */
            color: #9ca3af;
            text-align: center;
        }

        .copyright-text {
            line-height: 1.5;
            letter-spacing: 0.3px;
        }

        .trustiq-link {
            color: #dc2626 !important; /* Solid Red */
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .trustiq-link:hover {
            color: #ef4444 !important; /* Brighter red on hover */
            text-shadow: 0 0 8px rgba(220, 38, 38, 0.6);
        }

        .scroll-top-btn {
            position: absolute;
            right: 0; /* Professional alignment to the right boundary */
            background: linear-gradient(145deg, #120000, #050000);
            color: white;
            border: 1px solid rgba(220, 38, 38, 0.3);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
        }
        
        .scroll-top-btn:hover {
            background: #2e0505;
            border-color: rgba(220, 38, 38, 0.8);
            color: #ffc2c2;
        }
    </style>
</head>
<body>

    <!-- Sticky Header and Search Wrapper -->
    <div class="sticky-wrapper">
        <!-- Header -->
        <header>
            <div class="menu-icon" onclick="toggleNavDropdown()"><i class="fa-solid fa-bars"></i></div>
            <a href="/" class="logo" id="headerLogoContainer">
                <!-- ইমেজ এবং গ্লোয়িং টেক্সট লোগো এখানে পাশাপাশি লোড হবে -->
            </a>
        </header>

        <!-- Dropdown Navigation Drawer -->
        <div class="nav-menu-dropdown" id="navDropdown">
            <ul class="dropdown-links" id="drawerLinksContainer">
                <!-- Dynamic Menu Items will load here -->
            </ul>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Announcement Banner -->
        <div class="announcement-banner" id="announceBanner">
            <p id="announcementText"></p>
            <a href="#" id="telegramJoinLink" class="join-btn" target="_blank">Join Now</a>
        </div>

        <!-- Popular Tools Dropdown -->
        <div class="popular-tools-btn" id="popularBtn">
            <span>Popular Tools</span>
            <i class="fa-solid fa-chevron-right" id="popArrow"></i>
        </div>
        <div class="popular-tools-list" id="popularList"></div>
        
        <!-- Tool Card -->
        <div class="tool-card">
            <h2>Website Speed Checker</h2>
            
            <!-- URL Input -->
            <div class="form-group">
                <label>Enter Website Domain / URL</label>
                <input type="text" id="urlInput" placeholder="e.g. google.com or https://facebook.com">
            </div>

            <!-- Action Button -->
            <button class="check-btn" onclick="checkWebsiteSpeed()"><i class="fa-solid fa-bolt"></i> Check Speed Metrics</button>

            <!-- Results Panel -->
            <div class="result-panel" id="resultPanel">
                <h3>Speed Performance Report</h3>
                
                <div class="result-row">
                    <span>Target Host URL</span>
                    <span id="resUrl" style="color:var(--text-muted);">N/A</span>
                </div>
                <div class="result-row">
                    <span>Performance Score</span>
                    <span id="resScore" class="status-score">0/100</span>
                </div>
                <div class="result-row">
                    <span>Full Loading Speed</span>
                    <span id="resLoadTime" style="color:var(--text-main);">N/A</span>
                </div>
                <div class="result-row">
                    <span>Time to First Byte (TTFB)</span>
                    <span id="resTtfb" style="color:var(--text-main);">N/A</span>
                </div>
                <div class="result-row">
                    <span>Estimated Page Size</span>
                    <span id="resSize" style="color:var(--text-main);">N/A</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Footer - Pure Black with Abstract Top Glow -->
    <footer>
        <div class="footer-content">
            <div class="footer-about">
                <h4>About Us</h4>
                <p id="footerAboutText">One Step Online Tools</p>
            </div>
            <div class="footer-grid" id="footerGridContainer">
                <!-- Columns render dynamically -->
            </div>
        </div>
        <!-- Centered Copyright Bar -->
        <div class="copyright-bar">
            <span class="copyright-text" id="copyrightSpan">
                &copy; 2026. All Rights Reserved by <a href="https://www.facebook.com/profile.php?id=61586091802176" target="_blank" class="trustiq-link">Trustiq</a>.
            </span>
            <button class="scroll-top-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                <i class="fa-solid fa-chevron-up"></i>
            </button>
        </div>
    </footer>

    <script>
      

        let siteData = null;

        async function loadData() {
            try {
                const res = await fetch(`${GIST_URL}?t=${Date.now()}`);
                if (!res.ok) throw new Error();
                siteData = await res.json();
                applyTheme();
                applySiteConfig();
                handlePopupModal(); // পপআপ মডাল প্রসেসর
                trackVisits(); // ট্র্যাফিক ট্র্যাক সিস্টেম স্টার্ট
            } catch (e) {
                console.error("Gist Load Failed. Check Gist connection.");
            }
        }

        // Apply theme properties dynamically
        function applyTheme() {
            if (siteData.themeConfig) {
                const root = document.documentElement;
                Object.entries(siteData.themeConfig).forEach(([key, val]) => {
                    const cssKey = `--${key.replace(/([A-Z])/g, "-$1").toLowerCase()}`;
                    root.style.setProperty(cssKey, val);
                });
            }
        }

        function applySiteConfig() {
            // Header Settings (ইমেজ ও টেক্সট পাশাপাশি লোড লজিক এবং ডাবল BCT বাগ ফিক্সড)
            const logoContainer = document.getElementById('headerLogoContainer');
            let imgHTML = '';
            if (siteData.siteConfig.logoUrl && siteData.siteConfig.logoUrl.trim() !== "") {
                imgHTML = `
                    <div class="logo-img-container">
                        <img src="${siteData.siteConfig.logoUrl}">
                    </div>
                `;
            } else {
                let iconClass = siteData.siteConfig.logoIcon || 'fa-shield-halved';
                if (!iconClass.includes('fa-')) {
                    iconClass = 'fa-solid fa-' + iconClass;
                } else if (!iconClass.includes('fa-solid') && !iconClass.includes('fa-regular') && !iconClass.includes('fas') && !iconClass.includes('far')) {
                    iconClass = 'fa-solid ' + iconClass;
                }

                imgHTML = `
                    <div class="logo-icon">
                        <i class="${iconClass}"></i>
                    </div>
                `;
            }

            const siteName = siteData.siteConfig.siteName || "TEAM BCT";
            let textHTML = "";
            const parts = siteName.trim().split(/\s+/);
            
            if (parts.length > 1) {
                let firstPart = parts[0].toUpperCase();
                let secondPart = parts.slice(1).join(" ").toUpperCase();
                textHTML = `${firstPart}<span>${secondPart}</span>`;
            } else {
                if (siteName.toLowerCase().startsWith("team") && siteName.length > 4) {
                    let firstPart = "TEAM";
                    let secondPart = siteName.slice(4).toUpperCase();
                    textHTML = `${firstPart}<span>${secondPart}</span>`;
                } else {
                    textHTML = `${siteName.toUpperCase()}<span>BCT</span>`;
                }
            }

            // সঠিক ভেরিয়েবল textHTML দিয়ে ইনজেকশন
            logoContainer.innerHTML = `
                ${imgHTML}
                <span class="logo-text">${textHTML}</span>
            `;

            // Navigation Menu with Icons
            const drawerLinks = document.getElementById('drawerLinksContainer');
            drawerLinks.innerHTML = '';
            siteData.navigationMenu.forEach(menu => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${menu.link}"><i class="fa-solid ${menu.icon || 'fa-link'}"></i> ${escapeHtml(menu.title)}</a>`;
                drawerLinks.appendChild(li);
            });

            // Announcement Banner
            const banner = document.getElementById('announceBanner');
            if (siteData.siteConfig.showAnnouncement) {
                banner.style.display = 'block';
                document.getElementById('announcementText').innerText = siteData.siteConfig.announcementText;
                document.getElementById('telegramJoinLink').href = siteData.siteConfig.telegramUrl;
            } else {
                banner.style.display = 'none';
            }

            // Popular tools dropdown (ডাইনামিক লিঙ্ক ও ক্লিক অ্যাকশন)
            const popList = document.getElementById('popularList');
            popList.innerHTML = '';
            siteData.siteConfig.popularTools.forEach(tool => {
                const div = document.createElement('div');
                div.className = 'popular-item';
                div.innerHTML = `<i class="fa-solid fa-check"></i> <span>${escapeHtml(tool.title)}</span>`;
                
                div.onclick = function() {
                    trackToolUsed();
                    if (tool.link === '#') {
                        Swal.fire({
                            title: 'Coming Soon!',
                            text: `${tool.title} is under development.`,
                            icon: 'info',
                            background: siteData.themeConfig.cardBg || '#131c31',
                            color: '#fff',
                            confirmButtonColor: siteData.themeConfig.accentBlue || '#ef4444'
                        });
                    } else {
                        window.location.href = tool.link;
                    }
                };
                popList.appendChild(div);
            });

            // Footer Configuration
            document.getElementById('footerAboutText').innerText = siteData.footerConfig.aboutText;

            const footerGrid = document.getElementById('footerGridContainer');
            footerGrid.innerHTML = '';
            siteData.footerConfig.columns.forEach(col => {
                const div = document.createElement('div');
                div.className = 'footer-col';
                div.innerHTML = `<h5>${escapeHtml(col.title)}</h5><ul class="footer-links"></ul>`;
                const ul = div.querySelector('.footer-links');
                col.links.forEach(l => {
                    ul.innerHTML += `<li><a href="${l.url}">${escapeHtml(l.title)}</a></li>`;
                });
                footerGrid.appendChild(div);
            });
        }

        // Dropdown Navigation Drawer Controls (থ্রি-লাইন ড্রপডাউন টগল ও আইকন পরিবর্তন)
        function toggleNavDropdown() {
            const dropdown = document.getElementById('navDropdown');
            const menuIcon = document.querySelector('.menu-icon i');
            const isVisible = dropdown.style.display === 'block';

            if (isVisible) {
                dropdown.style.display = 'none';
                menuIcon.className = 'fa-solid fa-bars';
            } else {
                dropdown.style.display = 'block';
                menuIcon.className = 'fa-solid fa-xmark';
            }
        }

        // Popular Dropdown Toggle
        const popularBtn = document.getElementById('popularBtn');
        const popularList = document.getElementById('popularList');
        const popArrow = document.getElementById('popArrow');
        popularBtn.addEventListener('click', () => {
            const isFlex = popularList.style.display === 'flex';
            popularList.style.display = isFlex ? 'none' : 'flex';
            popArrow.className = isFlex ? 'fa-solid fa-chevron-right' : 'fa-solid fa-chevron-down';
        });

        // ডাইনামিক পপআপ মডাল হ্যান্ডলার (Session Storage যুক্ত - সেশনে ১ বার দেখাবে)
        function handlePopupModal() {
            if (siteData.modalConfig && siteData.modalConfig.showModal) {
                // সেশনে একবার ক্লোজ করা হলে দ্বিতীয়বার পেজ রিফ্রেশে আর দেখাবে না (ইউজার ফ্রেন্ডলি রাখার জন্য)
                if (!sessionStorage.getItem('modalClosed')) {
                    document.getElementById('modalTitle').innerText = siteData.modalConfig.title;
                    document.getElementById('modalDescription').innerText = siteData.modalConfig.description;
                    document.getElementById('modalActionBtn').innerText = siteData.modalConfig.buttonText;
                    document.getElementById('modalActionBtn').href = siteData.modalConfig.buttonUrl;
                    
                    const overlay = document.getElementById('popupModal');
                    overlay.style.display = 'flex';
                    setTimeout(() => {
                        overlay.classList.add('open');
                    }, 50);
                }
            }
        }

        // মডাল ক্লোজ
        function closePopupModal() {
            const overlay = document.getElementById('popupModal');
            overlay.classList.remove('open');
            setTimeout(() => {
                overlay.style.display = 'none';
                sessionStorage.setItem('modalClosed', 'true'); // সেশন ফ্ল্যাগ সেট
            }, 300);
        }

        // ==================== WEBSITE SPEED CHECKER CORE ====================
        async function checkWebsiteSpeed() {
            const urlVal = document.getElementById('urlInput').value.trim();
            if (!urlVal) {
                Swal.fire('Input Error', 'Please enter a valid website URL!', 'error');
                return;
            }

            // Normalize URL
            let cleanUrl = urlVal;
            if (!cleanUrl.startsWith('http://') && !cleanUrl.startsWith('https://')) {
                cleanUrl = 'https://' + cleanUrl;
            }

            Swal.fire({
                title: 'Analyzing Performance Speed...',
                text: `Measuring page response from remote gateway: ${cleanUrl}`,
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            const startTotal = performance.now();

            try {
                // Using free CORS Proxy AllOrigins to ping the website safely
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(cleanUrl)}&t=${Date.now()}`);
                const endFetch = performance.now();
                const totalTime = endFetch - startTotal;
                Swal.close();

                if (res.ok) {
                    const data = await res.json();
                    
                    // Estimate page size based on raw HTML string content length
                    const rawContent = data.contents || "";
                    const sizeInBytes = rawContent.length;
                    const sizeInKB = (sizeInBytes / 1024).toFixed(2);

                    // Formulas to estimate speed metrics
                    const ttfb = (totalTime * 0.35).toFixed(0); // Estimated TTFB is around 35% of total request load latency
                    const speedScore = Math.max(10, Math.min(100, Math.round(100 - (totalTime / 50))));

                    // UI Data Injection
                    document.getElementById('resScore').innerText = `${speedScore}/100`;
                    document.getElementById('resLoadTime').innerText = `${totalTime.toFixed(0)} ms`;
                    document.getElementById('resTtfb').innerText = `${ttfb} ms`;
                    document.getElementById('resSize').innerText = `${sizeInKB} KB`;
                    document.getElementById('resUrl').innerText = cleanUrl;

                    // Set score color dynamically
                    const scoreEl = document.getElementById('resScore');
                    if (speedScore >= 80) scoreEl.style.color = '#10b981'; // Green
                    else if (speedScore >= 50) scoreEl.style.color = '#fb923c'; // Orange
                    else scoreEl.style.color = '#ef4444'; // Red

                    const panel = document.getElementById('resultPanel');
                    panel.style.display = 'block';
                    panel.scrollIntoView({ behavior: 'smooth' });
                } else {
                    throw new Error();
                }
            } catch (err) {
                Swal.close();
                Swal.fire('Fetch Failed', 'Failed to fetch the target website. Please make sure the URL is valid and online.', 'error');
            }
        }

        // ক্লাউড অ্যানালিটিক্স ট্র্যাক সিস্টেম
        function trackVisits() {
            fetch('https://api.countapi.xyz/hit/teambct_analytics/total_visits').catch(() => {});
            
            if (!sessionStorage.getItem('visitedToday')) {
                const today = new Date().toISOString().split('T')[0];
                fetch(`https://api.countapi.xyz/hit/teambct_analytics/daily_visits_${today}`).catch(() => {});
                sessionStorage.setItem('visitedToday', 'true');
            }
        }

        function trackToolUsed() {
            fetch('https://api.countapi.xyz/hit/teambct_analytics/total_tool_clicks').catch(() => {});
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m]));
        }

        window.onload = loadData;
    </script>
</body>
